<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker</title>

      <!-- tailwind and daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- font -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">




</head>
<body class=" my-24  max-w-md mx-auto bg-base-400 rounded-md shadow-2xl ">

    <div class="logo   w-[200px] mx-auto pt-24 pl-14">
        <img src="./assets/github-logo.png">
    </div>
  
<div class="mx-auto pt-6 text-center">
<h2 class="font-bold text-2xl"> GitHub Issues Tracker</h2>
        <p class="text-blue-800  opacity-50">Sign in to manage your issues</p>
</div>


<!-- form -->

<div class="form ">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 pl-8 pb-10 ">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label font-semibold text-black text-xs">Username</label>
          <input type="text" class="input text-blue-800 opacity-75" placeholder="Enter Username" />
          <label class="label text-black text-xs font-semibold">Password</label>
          <input type="password" class="input text-blue-800 opacity-75" placeholder="Enter Password" />
          <button class="btn btn-primary mt-4">Login</button>
        </fieldset>
      </div>
    </div>

</div>

</body>



</html>
