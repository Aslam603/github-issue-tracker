<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home page</title>

<!-- tailwind and daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- font -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">





</head>
<body>

    <!-- navbar -->
    <section class="flex flex-col gap-4  md:flex-row justify-between   items-center py-4 px-12 bg-white    border border-b-gray-300   ">
        <!-- left side -->
  <div class="flex  gap-2 items-center">
  <img  class="w-[35px]" src="./assets/github-logo.png">

<h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
  </div>

<!-- right side -->
  <div class="flex  gap-2 items-center">
<div class="relative w-auto">
    <i class="fa-solid fa-magnifying-glass   absolute  left-[10%] bottom-[13%]  -translate-y-1/2  z-10  opacity-40"></i>
        <input  id="searchInput" type="text" placeholder=   " Search Issues..."  class="input input-bordered w-full pl-10 " />
</div>
    <button class="btn btn-primary"> <i class="fa-solid fa-plus"></i> New Issue</button>
  </div>




  </section>

  <section class="mx-40  mt-16 mb-5">
<div  class="py-7 px-4 flex gap-3  border-red-50 rounded-md shadow-sm">
    <button id="allBtn"     class="btn px-12   tibet ">All</button>
    <button id="openBtn"      class="btn px-12 tibet    ">Open</button>
    <button id="closeBtn"      class="btn px-12   tibet   ">Closed</button>
</div>



  </section>

  <section class="mx-40   p-5   border-red-50 rounded-md shadow-sm  flex justify-between items-center">

<div class="flex items-center">
<img class="w-8 h-8 bg-gray-300 rounded-full m-4 p-1" src="./assets/Aperture.png">
<div>
    <h2  id="counter"    class="font-semibold text-xl">0 Issues</h2>
    <p class="opacity-55">Track and manage your project issues</p>
</div>
</div>

<div class="flex justify-between gap-4">
    <div class="flex items-center gap-2">
<img class="w-3 h-3" src="./assets/Ellipse 2.png">
<p>Open</p>
    </div>
    <div class="flex items-center gap-2">
<img  class="w-3 h-3"  src="./assets/Ellipse 2 (2).png">
<p>Closed</p>
    </div>
</div>

  </section>

<div id="cardContainer"  class="grid grid-cols-4  gap-5   mx-40">

</div>

<div id="loadingSpinner" class="h-[60vh]  flex justify-center items-center">
    <span class="loading loading-dots loading-xl"></span>
</div>



<div id="surprise" class="fixed inset-0 hidden justify-center items-center z-50">

<div class="absolute inset-0 bg-blue-300 opacity-25"></div>

<div class="relative bg-white   w-2/4 p-7 rounded-xl z-10">

    <h2 id="modalTitle"  class="text-xl font-bold mb-4"></h2>

    <div class="flex items-center gap-3 mb-4">
        <button id="modalStatus" class="px-4 py-2 rounded-md font-semibold text-white bg-green-400"></button>
        
        <span id="assigneeHere" class="text-gray-500 text-xs"></span>
    </div>

<div id="modalLabels" class="flex flex-wrap gap-3 mb-4"></div>

<p id="modalDescription" class="text-gray-700 mb-4"></p>

<div class="flex items-start gap-11 mb-5 text-xs">

<div>

    <div class="font-semibold">Assignee:</div>
    <div id="modalAssignee" class="text-black"></div>
</div>

<div>
    <div class="font-semibold">Priority:</div>
    <button id="modalPriority" class="px-4 py-2 text-[15px] rounded-md font-semibold"></button>
</div>

</div>


<div class="flex justify-end">
    <button id="modalClose" class="bg-blue-600 text-white px-4 py-2 rounded">Close</button>
</div>

</div>


</div>



<script src="./script/main.js"></script>
</body>
</html>
