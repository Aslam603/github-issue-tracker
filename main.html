<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home page</title>

<!-- tailwind and daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- font -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">





</head>
<body>

    <!-- navbar -->
    <section class="flex flex-col gap-4     md:flex-row justify-between   items-center py-4 px-12 bg-white    border border-b-gray-300   ">
        <!-- left side -->
  <div class="flex  gap-2 items-center">
  <img  class="w-[35px]" src="./assets/github-logo.png">

<h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
  </div>

<!-- right side -->
  <div class="flex  gap-2 items-center">
<div class="relative w-auto">
    <i class="fa-solid fa-magnifying-glass   absolute  left-[10%] bottom-[13%]  -translate-y-1/2  z-10  opacity-40"></i>
        <input type="text" placeholder=   " Search Issues..." class="input input-bordered w-full pl-10 " />
</div>
    <button class="btn btn-primary"> <i class="fa-solid fa-plus"></i> New Issue</button>
  </div>
  </section>

  <section class="mx-40  mt-16 mb-5">
<div  class="py-7 px-4 flex gap-3  border-red-50 rounded-md shadow-sm">
    <button class="btn px-12">All</button>
    <button class="btn px-12">Open</button>
    <button class="btn px-12">Closed</button>
</div>
  </section>

  <section class="mx-40   p-5   border-red-50 rounded-md shadow-sm  flex justify-between items-center">

<div class="flex items-center">
<img class="w-8 h-8 bg-gray-300 rounded-full m-4 p-1" src="./assets/Aperture.png">
<div>
    <h2 class="font-semibold text-xl">50 Issues</h2>
    <p class="opacity-55">Track and manage your project issues</p>
</div>
</div>

<div class="flex justify-between gap-4">
    <div class="flex items-center gap-2">
<img class="w-3 h-3" src="./assets/Ellipse 2.png">
<p>Open</p>
    </div>
    <div class="flex items-center gap-2">
<img  class="w-3 h-3"  src="./assets/Ellipse 2 (2).png">
<p>Closed</p>
    </div>
</div>

  </section>





</body>
</html>
